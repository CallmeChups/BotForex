name: Deploy to Home Server

on:
  workflow_dispatch:
    inputs:
      restart_streamlit:
        description: 'Restart Streamlit after deploy?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 100.110.182.114 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy - git pull + install deps
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              Set-Location D:\\BotForex; \
              Write-Host 'CWD:' (Get-Location); \
              Write-Host 'Remote:' (git remote -v); \
              Write-Host 'Pulling latest code...'; \
              \$result = git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/CallmeChups/BotForex.git main 2>&1; \
              Write-Host \$result; \
              if (\$LASTEXITCODE -ne 0) { Write-Error 'git pull failed'; exit 1 }; \
              Write-Host 'Installing dependencies...'; \
              .venv\\Scripts\\pip.exe install -r requirements.txt --quiet; \
              Write-Host 'Deploy complete.' \
            \""

      - name: Restart API Server
        if: ${{ github.event.inputs.restart_streamlit == 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              \$pid8502 = (Get-NetTCPConnection -LocalPort 8502 -ErrorAction SilentlyContinue | Select-Object -First 1).OwningProcess; \
              if (\$pid8502) { Stop-Process -Id \$pid8502 -Force -ErrorAction SilentlyContinue; Start-Sleep -Seconds 2 }; \
              schtasks /Delete /TN 'ApiServerRestart' /F 2>null; \
              schtasks /Create /TN 'ApiServerRestart' /TR 'D:\\BotForex\\scripts\\start_api.bat' /SC ONCE /ST 00:00 /RL HIGHEST /F; \
              schtasks /Run /TN 'ApiServerRestart'; \
              Write-Host 'API server restarted on port 8502' \
            \""

      - name: Smart restart bots
        if: ${{ github.event.inputs.restart_streamlit == 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              Set-Location D:\\BotForex; \
              \$flagDir = 'D:\\BotForex\\logs\\pending_restart'; \
              New-Item -ItemType Directory -Force \$flagDir | Out-Null; \
              \$stateFile = 'D:\\BotForex\\data\\bot_state.json'; \
              if (Test-Path \$stateFile) { \
                \$states = Get-Content \$stateFile | ConvertFrom-Json; \
              } else { \
                \$states = @(); \
              }; \
              \$botsFile = 'D:\\BotForex\\data\\running_bots.json'; \
              if (Test-Path \$botsFile) { \
                \$bots = Get-Content \$botsFile | ConvertFrom-Json; \
              } else { \
                \$bots = @(); \
              }; \
              foreach (\$bot in \$bots) { \
                \$pid = \$bot.pid; \
                \$state = \$states | Where-Object { \$_.pid -eq \$pid } | Select-Object -First 1; \
                \$busy = \$state -and (\$state.active -gt 0 -or \$state.pending -gt 0); \
                if (\$busy) { \
                  Write-Host \"Bot PID \$pid (\$(\$bot.symbol)) busy (active=\$(\$state.active) pending=\$(\$state.pending)) - flagging for deferred restart\"; \
                  New-Item -ItemType File -Force \"\$flagDir\\\$pid.flag\" | Out-Null; \
                } else { \
                  Write-Host \"Bot PID \$pid (\$(\$bot.symbol)) idle - stopping now (will be restarted by Streamlit UI)\"; \
                  try { Stop-Process -Id \$pid -Force -ErrorAction SilentlyContinue } catch {}; \
                  Start-Sleep -Seconds 1; \
                } \
              }; \
              Write-Host 'Smart bot restart complete' \
            \""

      - name: Restart Streamlit
        if: ${{ github.event.inputs.restart_streamlit == 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              New-Item -ItemType Directory -Force D:\\BotForex\\logs | Out-Null; \
              \$port = Get-NetTCPConnection -LocalPort 8501 -ErrorAction SilentlyContinue; \
              if (\$port) { \
                Write-Host 'Port 8501 in use, killing owning process...'; \
                \$pid8501 = (Get-NetTCPConnection -LocalPort 8501 -ErrorAction SilentlyContinue | Select-Object -First 1).OwningProcess; \
                if (\$pid8501) { Stop-Process -Id \$pid8501 -Force -ErrorAction SilentlyContinue }; \
                Start-Sleep -Seconds 3; \
              } else { \
                Write-Host 'Port 8501 free, starting fresh...'; \
              }; \
              schtasks /Delete /TN 'StreamlitRestart' /F 2>null; \
              schtasks /Create /TN 'StreamlitRestart' /TR 'D:\\BotForex\\scripts\\start_streamlit.bat' /SC ONCE /ST 00:00 /RL HIGHEST /F; \
              schtasks /Run /TN 'StreamlitRestart'; \
              Write-Host 'Waiting for Streamlit to start...'; \
              Start-Sleep -Seconds 12; \
              \$up = Get-NetTCPConnection -LocalPort 8501 -ErrorAction SilentlyContinue; \
              if (\$up) { \
                Write-Host 'Streamlit is up on port 8501'; \
              } else { \
                Write-Error 'Streamlit failed to start on port 8501'; \
                exit 1; \
              } \
            \""
