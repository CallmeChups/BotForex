name: Deploy to Home Server

on:
  workflow_dispatch:
    inputs:
      restart_streamlit:
        description: 'Restart Streamlit after deploy?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 100.110.182.114 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy - git pull + install deps
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              Set-Location D:\\BotForex; \
              Write-Host 'Pulling latest code...'; \
              git pull origin main; \
              Write-Host 'Installing dependencies...'; \
              .venv\\Scripts\\pip.exe install -r requirements.txt --quiet; \
              Write-Host 'Deploy complete.' \
            \""

      - name: Restart Streamlit
        if: ${{ github.event.inputs.restart_streamlit == 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              \$proc = Get-Process -Name 'streamlit' -ErrorAction SilentlyContinue; \
              if (\$proc) { \
                Stop-Process -Name 'streamlit' -Force; \
                Write-Host 'Streamlit stopped.'; \
              } else { \
                Write-Host 'Streamlit not running, skipping stop.'; \
              }; \
              Start-Sleep -Seconds 2; \
              \$logPath = 'D:\\BotForex\\logs\\streamlit.log'; \
              \$cmd = 'D:\\BotForex\\.venv\\Scripts\\streamlit.exe run D:\\BotForex\\app.py --server.port 8501'; \
              Start-Process powershell -ArgumentList '-NonInteractive','-Command',\$cmd -RedirectStandardOutput \$logPath -WindowStyle Hidden; \
              Write-Host 'Streamlit restarted.' \
            \""
