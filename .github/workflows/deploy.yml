name: Deploy to Home Server

on:
  workflow_dispatch:
    inputs:
      restart_streamlit:
        description: 'Restart Streamlit after deploy?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 100.110.182.114 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy - git pull + install deps
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              Set-Location D:\\BotForex; \
              Write-Host 'CWD:' (Get-Location); \
              Write-Host 'Remote:' (git remote -v); \
              Write-Host 'Pulling latest code...'; \
              \$result = git pull https://github.com/CallmeChups/BotForex.git main 2>&1; \
              Write-Host \$result; \
              if (\$LASTEXITCODE -ne 0) { Write-Error 'git pull failed'; exit 1 }; \
              Write-Host 'Installing dependencies...'; \
              .venv\\Scripts\\pip.exe install -r requirements.txt --quiet; \
              Write-Host 'Deploy complete.' \
            \""

      - name: Restart Streamlit
        if: ${{ github.event.inputs.restart_streamlit == 'true' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hyperion@100.110.182.114 \
            "powershell -NonInteractive -Command \"\
              New-Item -ItemType Directory -Force D:\\BotForex\\logs | Out-Null; \
              \$port = Get-NetTCPConnection -LocalPort 8501 -ErrorAction SilentlyContinue; \
              if (\$port) { \
                Write-Host 'Port 8501 in use, stopping existing process...'; \
                Get-Process -Name 'streamlit' -ErrorAction SilentlyContinue | Stop-Process -Force; \
                Start-Sleep -Seconds 3; \
              } else { \
                Write-Host 'Port 8501 free, starting fresh...'; \
              }; \
              schtasks /Delete /TN 'StreamlitRestart' /F 2>null; \
              schtasks /Create /TN 'StreamlitRestart' /TR 'D:\\BotForex\\scripts\\start_streamlit.bat' /SC ONCE /ST 00:00 /RL HIGHEST /F; \
              schtasks /Run /TN 'StreamlitRestart'; \
              Write-Host 'Waiting for Streamlit to start...'; \
              Start-Sleep -Seconds 12; \
              \$up = Get-NetTCPConnection -LocalPort 8501 -ErrorAction SilentlyContinue; \
              if (\$up) { \
                Write-Host 'Streamlit is up on port 8501'; \
              } else { \
                Write-Error 'Streamlit failed to start on port 8501'; \
                exit 1; \
              } \
            \""
